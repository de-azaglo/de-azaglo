<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070f" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020306" />
    </linearGradient>

    <!-- Teal/Cyan Glow -->
    <radialGradient id="teal-glow" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>

    <!-- Indigo/Violet Glow -->
    <radialGradient id="indigo-glow" cx="20%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1" />
    </pattern>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.22; }
    }
    @keyframes pulse-subtle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    .orb-indigo {
      animation: pulse 8s ease-in-out infinite alternate;
    }
    .orb-teal {
      animation: pulse 6s ease-in-out infinite alternate;
    }
    .node-glow {
      animation: pulse-subtle 4s ease-in-out infinite alternate;
    }
    .tech-pill:hover {
      fill: #1e293b;
      stroke: #14b8a6;
      cursor: pointer;
    }
  </style>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Ambient Glows -->
  <rect width="100%" height="100%" fill="url(#teal-glow)" class="orb-teal" />
  <rect width="100%" height="100%" fill="url(#indigo-glow)" class="orb-indigo" />

  <!-- Corner accents -->
  <path d="M 30 60 L 30 30 L 60 30" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4" />
  <path d="M 1170 240 L 1170 270 L 1140 270" stroke="#14b8a6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4" />

  <!-- Coding aesthetics floating elements -->
  <g opacity="0.2" font-family="Consolas, Fira Code, Monaco, monospace" font-size="11" fill="#94a3b8">
    <text x="50" y="80">&lt;script setup&gt;</text>
    <text x="50" y="100">const developer = 'Derrick';</text>
    <text x="50" y="120">const status = 'Building';</text>
    
    <text x="1000" y="180">class App extends Service {</text>
    <text x="1020" y="200">protected $laundriGo;</text>
    <text x="1000" y="220">}</text>
  </g>

  <!-- Connected Nodes (Left & Right) -->
  <g stroke="rgba(99, 102, 241, 0.15)" stroke-width="1">
    <line x1="120" y1="180" x2="180" y2="130" />
    <line x1="180" y1="130" x2="220" y2="200" />
    <line x1="220" y1="200" x2="150" y2="230" />
    <line x1="150" y1="230" x2="120" y2="180" />
    
    <line x1="1020" y1="80" x2="1080" y2="120" />
    <line x1="1080" y1="120" x2="1050" y2="170" />
    <line x1="1050" y1="170" x2="990" y2="110" />
    <line x1="990" y1="110" x2="1020" y2="80" />
  </g>
  
  <g fill="#6366f1" class="node-glow">
    <circle cx="120" cy="180" r="4" />
    <circle cx="180" cy="130" r="3" />
    <circle cx="220" cy="200" r="5" />
    <circle cx="150" cy="230" r="3" />
  </g>
  <g fill="#14b8a6" class="node-glow" style="animation-delay: -2s;">
    <circle cx="1020" cy="80" r="3" />
    <circle cx="1080" cy="120" r="5" />
    <circle cx="1050" cy="170" r="4" />
    <circle cx="990" cy="110" r="3" />
  </g>

  <!-- Title Text -->
  <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="url(#text-grad)" text-anchor="middle" letter-spacing="4">
    DERRICK AZAGLO KWABENA
  </text>

  <!-- Subtitle Text -->
  <text x="600" y="175" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" fill="#94a3b8" text-anchor="middle" letter-spacing="2">
    Software Engineer
  </text>

  <!-- Tech tags under subtitle -->
  <g transform="translate(550, 220)">
    <!-- PHP Pill -->
    <g transform="translate(-100, -14)">
      <rect width="90" height="28" rx="14" fill="#0f172a" stroke="#6366f1" stroke-width="1.5" class="tech-pill" />
      <text x="45" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">PHP</text>
    </g>
    
    <!-- Go Pill -->
    <g transform="translate(10, -14)">
      <rect width="90" height="28" rx="14" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" class="tech-pill" />
      <text x="45" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2dd4bf" text-anchor="middle">GO</text>
    </g>
    
    <!-- Flutter Pill -->
    <g transform="translate(120, -14)">
      <rect width="90" height="28" rx="14" fill="#2a0f28ff" stroke="#9a14b8ff" stroke-width="1.5" class="tech-pill" />
      <text x="45" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#aa15cbff" text-anchor="middle">FLUTTER</text>
    </g>
  </g>
</svg>
